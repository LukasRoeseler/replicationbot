name: Daily Replication Bluesky Bot

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    
    steps:
      # Update auf v4 (Behebt die Node.js Warnung)
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Update auf v3 und Nutzung von fertigen Paketen (Behebt den bskyr Fehler)
      - name: Setup R
        uses: r-lib/actions/setup-r@v3
        with:
          r-version: 'release'
          use-public-rspm: true
          
      # Pakete installieren (geht jetzt rasend schnell und ohne Fehler)
      - name: Install R Packages
        run: |
          Rscript -e "install.packages(c('jsonlite', 'bskyr'))"
          
      # Dein Skript ausführen
      - name: Run Bot Script
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: Rscript bot.R
