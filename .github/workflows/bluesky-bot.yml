name: Daily Replication Bluesky Bot

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
          
      # Das ist der Gamechanger: Installiert R-Pakete UND Linux-Abhängigkeiten
      - name: Install Packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::bskyr
            any::jsonlite
            
      - name: Run Bot Script
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: Rscript bot.R
